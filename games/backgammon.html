<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOFTR — BACKGAMMON</title>
<link rel="stylesheet" href="../css/woftr.css">
<style>
  #board{ width:min(720px,94vw); margin:0.6em 0; border:1px solid var(--cyan-dim);
    box-shadow:0 0 18px rgba(0,255,255,0.2); padding:8px; }
  .quad{ display:flex; }
  .row{ display:flex; width:100%; }
  .pt{ flex:1; min-height:150px; display:flex; flex-direction:column; align-items:center;
    cursor:pointer; position:relative; padding-top:4px; }
  .pt.bottom{ flex-direction:column-reverse; padding-bottom:4px; padding-top:0; }
  .pt:nth-child(odd){ background:rgba(0,255,255,0.05); }
  .pt.sel{ box-shadow:inset 0 0 0 2px var(--cyan); }
  .pt.dest::before{ content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:18px;height:18px;border-radius:50%;background:rgba(0,255,255,0.5);box-shadow:0 0 8px var(--cyan); }
  .chk{ width:24px;height:24px;border-radius:50%;margin:2px; }
  .you{ background:radial-gradient(circle at 35% 30%,#c8ffff,#00a0a0); box-shadow:0 0 8px var(--cyan); }
  .wopr{ background:radial-gradient(circle at 35% 30%,#0b2b2b,#001a1a); border:1px solid var(--cyan-dim); }
  .ptnum{ font-size:0.6em; color:var(--cyan-dim); }
  .mid{ text-align:center; padding:4px; border-top:1px solid var(--cyan-dim); border-bottom:1px solid var(--cyan-dim); }
  #dice{ font-size:1.4em; letter-spacing:0.2em; }
  #status{ min-height:1.4em; margin-top:0.3em; }
  .bar{ font-size:0.8em; }
</style>
</head>
<body>
<div class="console">
  <div class="line title bold">BACKGAMMON</div>
  <div class="line muted">YOU ARE LIGHT (BEAR OFF AT POINT 1) — WOPR IS DARK</div>
  <hr class="divider">
  <div id="board"></div>
  <div class="mid bar" id="barline"></div>
  <div class="line" id="dice"></div>
  <div id="status" class="line"></div>
  <div>
    <button class="btn" id="roll">ROLL</button>
    <button class="btn" id="new">NEW GAME</button>
  </div>
  <div class="nav">&gt; <a href="index.html">RETURN TO MENU</a></div>
  <div class="hint">ROLL, THEN CLICK A POINT TO PICK UP, CLICK A HIGHLIGHTED POINT TO MOVE. ESC = MENU</div>
</div>
<div id="sound-note">PRESS ANY KEY TO ENABLE SOUND</div>
<script src="../woftr.js"></script>
<script>
// points[0..23]; positive = your checkers, negative = WOPR.
// You move from high index toward 0 and bear off at point "0 side".
// WOPR moves from low index toward 23.
let pts, barYou, barWopr, offYou, offWopr, dice, sel, turn, gameOver;
const boardEl=document.getElementById('board');
const statusEl=document.getElementById('status');
const diceEl=document.getElementById('dice');
const barEl=document.getElementById('barline');

function newGame(){
  pts=Array(24).fill(0);
  // standard setup (your perspective: you bear off near point index 0)
  pts[23]=2;  pts[12]=5;  pts[7]=3;  pts[5]=5;     // you (positive)
  pts[0]=-2;  pts[11]=-5; pts[16]=-3; pts[18]=-5;  // wopr (negative)
  barYou=0;barWopr=0;offYou=0;offWopr=0;
  dice=[];sel=null;turn='you';gameOver=false;
  render(); setStatus('YOUR TURN. PRESS ROLL.');
}

function rollDice(){
  if(gameOver)return;
  if(dice.length){ setStatus('FINISH YOUR MOVES FIRST.','amber'); return; }
  const a=1+Math.floor(Math.random()*6), b=1+Math.floor(Math.random()*6);
  dice = a===b ? [a,a,a,a] : [a,b];
  playBeep(300,0.05,0.05); playBeep(420,0.05,0.05);
  showDice();
  if(turn==='you'){
    if(!anyMove('you')){ setStatus('NO LEGAL MOVES. WOPR\u2019S TURN.','amber'); dice=[]; setTimeout(woprTurn,800);} 
    else setStatus('MOVE YOUR CHECKERS.');
  }
}
function showDice(){ diceEl.textContent = dice.length? 'DICE: '+dice.join('  ') : ''; }

// can a checker at point p move by die d? returns destination or null
function dest(side,p,d){
  if(side==='you'){
    const t=p-d;
    if(t<0) return 'off'; // bear off region handling below
    if(pts[t]<=-2) return null;       // blocked by 2+ wopr
    return t;
  } else {
    const t=p+d;
    if(t>23) return 'off';
    if(pts[t]>=2) return null;
    return t;
  }
}
function allHome(side){
  if(side==='you'){ // home = points 0..5
    for(let i=6;i<24;i++) if(pts[i]>0) return false; return barYou===0;
  } else { for(let i=0;i<18;i++) if(pts[i]<0) return false; return barWopr===0; }
}
function legalFrom(side,p,d){
  // entering from bar takes priority
  if(side==='you'&&barYou>0){ if(p!=='bar')return null; const t=24-d; return pts[t]<=-2?null:t; }
  if(side==='wopr'&&barWopr>0){ if(p!=='bar')return null; const t=d-1; return pts[t]>=2?null:t; }
  if(p==='bar')return null;
  if(side==='you'&&pts[p]<=0)return null;
  if(side==='wopr'&&pts[p]>=0)return null;
  const de=dest(side,p,d);
  if(de==='off'){
    if(!allHome(side))return null;
    // must be exact or highest
    if(side==='you'){ if(p-d===-1)return 'off'; // exact
      for(let i=d;i<6;i++) if(pts[i]>0) return null; return 'off'; }
    else { if(p+d===24)return 'off'; for(let i=23-d;i>17;i--) if(pts[i]<0) return null; return 'off'; }
  }
  return de;
}
function moveDests(side,p){
  const set=[];
  for(const d of [...new Set(dice)]){
    const t=legalFrom(side,p,d);
    if(t!==null) set.push({to:t,die:d});
  }
  return set;
}
function anyMove(side){
  if(side==='you'&&barYou>0) return moveDests('you','bar').length>0;
  if(side==='wopr'&&barWopr>0) return moveDests('wopr','bar').length>0;
  for(let i=0;i<24;i++){
    if(side==='you'&&pts[i]>0&&moveDests('you',i).length) return true;
    if(side==='wopr'&&pts[i]<0&&moveDests('wopr',i).length) return true;
  }
  return false;
}
function applyMove(side,p,m){
  const sign=side==='you'?1:-1;
  if(p==='bar'){ if(side==='you')barYou--; else barWopr--; }
  else pts[p]-=sign;
  if(m.to==='off'){ if(side==='you')offYou++; else offWopr++; }
  else {
    // hit?
    if(side==='you'&&pts[m.to]===-1){ pts[m.to]=0; barWopr++; }
    if(side==='wopr'&&pts[m.to]===1){ pts[m.to]=0; barYou++; }
    pts[m.to]+=sign;
  }
  dice.splice(dice.indexOf(m.die),1);
  showDice();
}

function render(){
  // build 24 points in two rows. Top row points 12..23, bottom 11..0
  boardEl.innerHTML='';
  const top=document.createElement('div'); top.className='row';
  const bot=document.createElement('div'); bot.className='row';
  const sl = sel!=null?moveDests('you',sel):[];
  function makePt(i,bottom){
    const d=document.createElement('div');
    d.className='pt'+(bottom?' bottom':'');
    if(sel===i)d.classList.add('sel');
    if(sl.some(m=>m.to===i))d.classList.add('dest');
    const n=document.createElement('div'); n.className='ptnum'; n.textContent=(i+1); d.appendChild(n);
    const count=Math.abs(pts[i]); const cls=pts[i]>0?'you':'wopr';
    for(let k=0;k<Math.min(count,6);k++){ const c=document.createElement('div'); c.className='chk '+cls; d.appendChild(c); }
    if(count>6){ const x=document.createElement('div'); x.className='ptnum'; x.textContent='\u00d7'+count; d.appendChild(x);}    
    d.addEventListener('click',()=>clickPt(i));
    return d;
  }
  for(let i=12;i<24;i++) top.appendChild(makePt(i,false));
  for(let i=11;i>=0;i--) bot.appendChild(makePt(i,true));
  boardEl.appendChild(top); boardEl.appendChild(bot);
  barEl.textContent=`BAR  YOU:${barYou}  WOPR:${barWopr}    BORNE OFF  YOU:${offYou}  WOPR:${offWopr}`;
}
function setStatus(t,cls=''){ statusEl.textContent=t; statusEl.className='line '+cls; }

function clickPt(i){
  if(gameOver||turn!=='you'||!dice.length)return;
  if(barYou>0){
    // must enter from bar
    const ms=moveDests('you','bar');
    const m=ms.find(x=>x.to===i);
    if(m){ applyMove('you','bar',m); afterYouMove(); }
    return;
  }
  if(sel!=null){
    const ms=moveDests('you',sel);
    const m=ms.find(x=>x.to===i);
    if(m){ applyMove('you',sel,m); sel=null; afterYouMove(); return; }
  }
  if(pts[i]>0){ sel=i; render(); playBeep(520,0.04,0.04); }
  else { sel=null; render(); }
}
function afterYouMove(){
  playBeep(440,0.05,0.05); render();
  if(offYou>=15){ gameOver=true; setStatus('YOU BORE OFF ALL CHECKERS. YOU WIN.','bold'); speak('You win.'); return; }
  if(!dice.length || !anyMove('you')){
    dice=[]; showDice(); sel=null; render();
    setStatus('WOPR\u2019S TURN...','muted'); turn='wopr'; setTimeout(woprTurn,800);
  } else setStatus('CONTINUE MOVING.');
}

// ── WOPR turn: roll + greedy moves ───────────────────────────
function woprTurn(){
  if(gameOver)return;
  const a=1+Math.floor(Math.random()*6),b=1+Math.floor(Math.random()*6);
  dice=a===b?[a,a,a,a]:[a,b]; showDice();
  let guard=0;
  while(dice.length&&anyMove('wopr')&&guard++<20){
    // pick a move: prefer hits, then furthest progress
    let candidates=[];
    if(barWopr>0){ candidates=moveDests('wopr','bar').map(m=>({p:'bar',m})); }
    else { for(let i=0;i<24;i++) if(pts[i]<0) for(const m of moveDests('wopr',i)) candidates.push({p:i,m}); }
    if(!candidates.length)break;
    candidates.sort((x,y)=>{
      const hx=(x.m.to!=='off'&&pts[x.m.to]===1)?1:0;
      const hy=(y.m.to!=='off'&&pts[y.m.to]===1)?1:0;
      if(hx!==hy)return hy-hx;
      const px=x.m.to==='off'?99:x.m.to, py=y.m.to==='off'?99:y.m.to;
      return py-px;
    });
    applyMove('wopr',candidates[0].p,candidates[0].m);
    render();
  }
  dice=[]; showDice();
  if(offWopr>=15){ gameOver=true; setStatus('WOPR BORE OFF ALL CHECKERS. WOPR WINS.','red'); speak('I win. A strange game.'); return; }
  turn='you'; setStatus('YOUR TURN. PRESS ROLL.');
}

document.getElementById('roll').addEventListener('click',rollDice);
document.getElementById('new').addEventListener('click',newGame);
newGame();
</script>
</body>
</html>

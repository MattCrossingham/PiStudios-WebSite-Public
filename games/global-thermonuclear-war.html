#map-panel #map-wrap { margin:0; }

#map-panel #cas-bar-fixed .c-us   { color:var(--cyan); }
#map-panel #cas-bar-fixed .c-ussr { color:var(--amber); }

.defcon-pip {
  width:14px; height:14px; border-radius:50%;
  border:1px solid #003a10; display:inline-block; margin:0 2px;

.defcon-pip.active { background:var(--red); box-shadow:0 0 8px var(--red); }
.defcon-pip.warn   { background:var(--amber); box-shadow:0 0 6px var(--amber); }
#defcon-text { color:var(--red); font-weight:bold; margin-left:4px; }
#cas-live { margin-left:auto; color:var(--green-dim); }
#terminal {

#terminal::-webkit-scrollbar{width:6px;}
#terminal::-webkit-scrollbar-thumb{background:var(--green-dim);}
.line{white-space:pre-wrap;word-break:break-word;line-height:1.55;}
.dim   {color:var(--green-dim);}

.red   {color:var(--red);font-weight:bold;}
.amber {color:var(--amber);}
.cyan  {color:var(--cyan);}

#map-container { font-size:clamp(9px, 2.8vw, 12px); line-height:1.28; letter-spacing:0.5px; }
.map-row{white-space:pre;}
.map-dot{color:#004a14;}
.map-city{color:var(--green);font-weight:bold;}
.map-dead{color:var(--red);}
#arc-canvas { position:absolute; top:0; left:0; pointer-events:none; }
.casualty-bar{display:flex;gap:24px;padding:4px 0;font-size:clamp(10px, 3vw, 13px);border-bottom:1px solid #003a10;flex-wrap:wrap;}
.c-us{color:var(--cyan);} .c-ussr{color:var(--amber);} .c-tot{color:var(--red);}

// ── VOICE ─────────────────────────────────────────────────────
function speak(text){
  try{ const sam=new SamJs({speed:72,pitch:64,mouth:128,throat:128}); sam.speak(text.toLowerCase()); }catch(e){}
}

// ── AUDIO ─────────────────────────────────────────────────────
let _ac;
function ac(){ if(!_ac) _ac=new(window.AudioContext||window.webkitAudioContext)(); return _ac; }

// 80s computer beep — short square wave blip
function beep(freq=440, dur=0.06, vol=0.07, delay=0){
  try{
    const c=ac(), o=c.createOscillator(), g=c.createGain();
    o.type='square'; o.frequency.value=freq;
    g.gain.setValueAtTime(vol, c.currentTime+delay);
    g.gain.linearRampToValueAtTime(0, c.currentTime+delay+dur);
    o.connect(g); g.connect(c.destination);
    o.start(c.currentTime+delay); o.stop(c.currentTime+delay+dur+0.01);
  }catch(e){}
}

// loading line sound — rising blip per character printed
function loadBeep(i){ beep(300+i*18, 0.04, 0.05); }

// dramatic low thud for detonation
function detonationSound(){
  try{
    const c=ac(), o=c.createOscillator(), g=c.createGain(), f=c.createBiquadFilter();
    o.type='sawtooth'; o.frequency.setValueAtTime(120,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(20,c.currentTime+0.6);
    f.type='lowpass'; f.frequency.value=400;
    g.gain.setValueAtTime(0.18,c.currentTime);
    g.gain.linearRampToValueAtTime(0,c.currentTime+0.7);
    o.connect(f); f.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime+0.8);
  }catch(e){}
}

// missile launch whistle — rising tone
function launchSound(){
  try{
    const c=ac(), o=c.createOscillator(), g=c.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(200,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(1800,c.currentTime+0.4);
    g.gain.setValueAtTime(0.07,c.currentTime);
    g.gain.linearRampToValueAtTime(0,c.currentTime+0.45);
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime+0.5);
  }catch(e){}
}

" . . . . . . . . . . . . . . . H . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .",

// ── STATE ────────────────────────────────────────────────────
// phase: 'sideselect' → 'playing' → 'gameover'
function fresh(){
  return{
    phase:'sideselect', side:null,
    playerCities:US_CITIES.map(c=>({...c,alive:true,dead:0,wounded:0})),
    enemyCities: USSR_CITIES.map(c=>({...c,alive:true,dead:0,wounded:0})),
    playerMissiles:10, woprMissiles:10,
    turn:0, busy:false, defcon:5,
  };
}
let G=fresh();
const arcHistory=[];

// ── DOM ──────────────────────────────────────────────────────
const term    =document.getElementById('terminal');
const slog    =document.getElementById('strike-log');
const cmdEl   =document.getElementById('cmd');
const promptEl=document.getElementById('prompt');
const casLive =document.getElementById('cas-live');
function setPrompt(t){promptEl.textContent=t;}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

function addLine(html='',cls=''){
  const d=document.createElement('div');
  d.className='line '+cls; d.innerHTML=html;
  term.appendChild(d); term.scrollTop=term.scrollHeight; return d;
}
function blank(ms=0){return new Promise(r=>{setTimeout(()=>{addLine();r();},ms);});}
async function p(html,cls='',ms=0){await sleep(ms);addLine(html,cls);}
async function tw(text,cls='',speed=40,ms=0){
  await sleep(ms); const d=addLine('',cls);
  for(const ch of text){await sleep(speed);d.textContent+=ch;term.scrollTop=term.scrollHeight;}
}
function logHit(html){
  const d=document.createElement('div');d.innerHTML=html;
  slog.appendChild(d);slog.scrollTop=slog.scrollHeight;
}

// ── DEFCON ───────────────────────────────────────────────────
function setDefcon(n){
  G.defcon=n;
  document.getElementById('defcon-text').textContent=n;
  for(let i=1;i<=5;i++){
    const pip=document.getElementById('pip'+i);
    pip.className='defcon-pip';
    if(i>=n&&n<=2) pip.classList.add('active');
    else if(i>=n&&n<=4) pip.classList.add('warn');
    else pip.style.background='#001a00';
  }
}
function updateCasLive(){
  const tot=[...G.playerCities,...G.enemyCities].reduce((a,c)=>a+c.dead,0);
  casLive.textContent='TOTAL KILLED: '+(tot>=1e6?(tot/1e6).toFixed(2)+'M':tot>=1e3?Math.round(tot/1e3)+'K':tot);
}

// ── FORMAT ───────────────────────────────────────────────────
function fmt(n){
  if(n>=1e6)return(n/1e6).toFixed(2)+'M';
  if(n>=1e3)return Math.round(n/1e3)+'K';
  return ''+n;
}
function calcCas(city){
  const pf=Math.min(1,city.pop/5e6);
  const dead=Math.floor(city.pop*(0.28+pf*0.18)*(0.8+Math.random()*0.4));
  const wounded=Math.floor(city.pop*(0.22+pf*0.10)*(0.8+Math.random()*0.4));
  const rad=Math.floor(city.pop*0.06*(0.7+Math.random()*0.6));
  return{dead,wounded:wounded+rad,rad};
}

// ── MAP ──────────────────────────────────────────────────────
let mapWrap=null,arcCanvas=null,arcCtx=null;
let CHAR_W=6.3,CHAR_H=13.4; // will be measured from DOM after render
function renderMap(){
  const rows=BASE_MAP.map(r=>Array.from(r));
  for(const c of [...G.playerCities,...G.enemyCities]){
    if(!c.alive&&c.row<rows.length)
      for(let dc=-1;dc<=1;dc++){const ci=c.col+dc;if(ci>=0&&ci<rows[c.row].length)rows[c.row][ci]='\x01';}
  }
  const wrap=document.createElement('div'); wrap.id='map-container';
  for(const row of rows){
    const rd=document.createElement('div'); rd.className='map-row';
    let h='';
    for(const ch of row){
      if(ch==='\x01') h+='<span class="map-dead">\u2715</span>';
      else if(ch==='.') h+='<span class="map-dot">.</span>';
      else h+=ch;
    }
    rd.innerHTML=h; wrap.appendChild(rd);
  }
  return wrap;
}
function showMap(){
  const panel=document.getElementById('map-wrap-fixed');
  panel.innerHTML='';
  mapWrap=document.createElement('div'); mapWrap.id='map-wrap';
  mapWrap.appendChild(renderMap());
  arcCanvas=document.createElement('canvas'); arcCanvas.id='arc-canvas';
  mapWrap.appendChild(arcCanvas);
  panel.appendChild(mapWrap);
  requestAnimationFrame(()=>{
    const mc=mapWrap.querySelector('#map-container');
    if(!mc)return;
    arcCanvas.width=mc.offsetWidth; arcCanvas.height=mc.offsetHeight;
    arcCtx=arcCanvas.getContext('2d');
    // measure actual character size from a rendered map row
    const firstRow=mc.querySelector('.map-row');
    if(firstRow){
      const rowH=firstRow.getBoundingClientRect().height;
      // each char in map row is one span or plain char — measure total width / char count
      const rowW=firstRow.getBoundingClientRect().width;
      const charCount=BASE_MAP[0].length;
      if(rowW>0 && charCount>0) CHAR_W=rowW/charCount;
      if(rowH>0) CHAR_H=rowH;
    }
    arcHistory.forEach(h=>drawTrail(h.trail,h.color+'44',1));
  });
}
function cityToXY(col,row){return{x:col*CHAR_W+CHAR_W/2,y:row*CHAR_H+CHAR_H/2};}
function drawTrail(trail,color,width){
  if(!arcCtx||!trail.length)return;
  arcCtx.beginPath(); arcCtx.strokeStyle=color; arcCtx.lineWidth=width;
  trail.forEach((pt,i)=>i===0?arcCtx.moveTo(pt.x,pt.y):arcCtx.lineTo(pt.x,pt.y));
  arcCtx.stroke();
}
function animateArc(src,dst,color){
  return new Promise(resolve=>{
    if(!arcCtx){resolve();return;}
    const s=cityToXY(src.col,src.row),d=cityToXY(dst.col,dst.row);
    const mid={x:(s.x+d.x)/2,y:Math.min(s.y,d.y)-60};
    const steps=40; let i=0; const trail=[];
    const iv=setInterval(()=>{
      const t=i/steps;
      const x=(1-t)*(1-t)*s.x+2*(1-t)*t*mid.x+t*t*d.x;
      const y=(1-t)*(1-t)*s.y+2*(1-t)*t*mid.y+t*t*d.y;
      trail.push({x,y});
      arcCtx.clearRect(0,0,arcCanvas.width,arcCanvas.height);
      arcHistory.forEach(h=>drawTrail(h.trail,h.color+'44',1));
      arcCtx.shadowColor=color; arcCtx.shadowBlur=4;
      drawTrail(trail,color,1.5);
      arcCtx.beginPath(); arcCtx.arc(x,y,2.5,0,Math.PI*2);
      arcCtx.fillStyle=color; arcCtx.fill();
      arcCtx.shadowBlur=0;
      i++;
      if(i>steps){
        clearInterval(iv);
        let fl=0;
        const fiv=setInterval(()=>{
          arcCtx.clearRect(d.x-20,d.y-20,40,40);
          if(fl%2===0){
            // expanding ring
            arcCtx.beginPath();
            arcCtx.arc(d.x,d.y,4+fl*1.5,0,Math.PI*2);
            arcCtx.strokeStyle=color;
            arcCtx.lineWidth=1.5;
            arcCtx.stroke();
            // crosshair lines hitting the exact city letter
            arcCtx.strokeStyle=color+'cc';
            arcCtx.lineWidth=1;
            arcCtx.beginPath();
            arcCtx.moveTo(d.x-14,d.y); arcCtx.lineTo(d.x+14,d.y);
            arcCtx.moveTo(d.x,d.y-14); arcCtx.lineTo(d.x,d.y+14);
            arcCtx.stroke();
          }
          fl++;
          if(fl>10){clearInterval(fiv);arcHistory.push({color,trail});resolve();}
        },55);
      }
    },28);
  });
}

function showCasBar(){

}

// ── PHASE 2: BOOT SEQUENCE (after side picked) ────────────────
async function runBoot(){
  term.innerHTML=''; // clear the side selection
  await blank(100);
  await tw('W.O.F.T.R. \u2014 WEAPONISED OPERATIONS & FILM TECHNOLOGY RESPONSE','bright',30);
  await p('NORAD / CHEYENNE MOUNTAIN  //  TOP SECRET','dim',200);
  await p('\u2500'.repeat(60),'dim',250);
  await blank(300);

  // loading lines with 80s computer sounds
  const bl=[
    'LOADING WARPLAN SIOP-62F . . . . . . . . . . [OK]',
    'MISSILE TRAJECTORY MATRIX . . . . . . . . . . [OK]',
    'SAC HEADQUARTERS UPLINK  . . . . . . . . . . [OK]',
    'NORAD EARLY WARNING  . . . . . . . . . . . . [OK]',
    'CASUALTY ESTIMATION MODULE . . . . . . . . . [OK]',
    'RADIATION DISPERSAL MODEL  . . . . . . . . . [OK]',
    'TARGET ACQUISITION NETWORK . . . . . . . . . [OK]',
  ];
  for(let i=0;i<bl.length;i++){
    loadBeep(i); // rising blip per line
    await p(bl[i],'dim');
    await sleep(160);
  }

  // confirmation blip sequence — like a real 80s system finishing its POST
  beep(600,0.05,0.06,0);
  beep(800,0.05,0.06,0.08);
  beep(1000,0.08,0.06,0.16);
  await blank(500);

  const sideLabel=G.side==='US'?'UNITED STATES':'SOVIET UNION';
  await p(`SIDE CONFIRMED: <span class="cyan">${sideLabel}</span>`,'',200);
  speak('Acknowledged.');
  await blank(300);

  setDefcon(5);
  await p('<span class="red blink">\u26a0  GLOBAL THERMONUCLEAR WAR  \u26a0</span>','',400);
  await blank(300);

  // defcon countdown with beeps
  for(let d=4;d>=1;d--){
    beep(200+d*40,0.12,0.08);
    await sleep(500);
    setDefcon(d);
    await p(`DEFCON ${d} \u2014 ${d===3?'FORCES MOBILISED':d===2?'LAUNCH AUTHORITY GRANTED':d===1?'NUCLEAR WAR IMMINENT':'INCREASED READINESS'}`,'red',0);
  }
  await blank(400);
  await p('US MISSILES: <span class="cyan">10</span>  |  WARHEAD YIELD: <span class="red">1.2 MT</span>  |  WOFTR MISSILES: <span class="red">10</span>','',300);
  await blank(400);

  // reset defcon for gameplay
  setDefcon(5);
  updateCasLive();
  G.phase='playing';
  await showTurn();
}

// ── TURN ─────────────────────────────────────────────────────
async function showTurn(){
  await blank(80);
  await p('\u2500'.repeat(60),'dim',100);
  await p(`TURN ${G.turn+1}  \u2551  US MISSILES: <span class="cyan">${G.playerMissiles}</span>  \u2551  WOFTR MISSILES: <span class="red">${G.woprMissiles}</span>  \u2551  DEFCON: <span class="red">${G.defcon}</span>`,'bright',150);
  await blank(180);
  showMap();
  showCasBar();
  await blank(100);

  const yourLabel=G.side==='US'?'US CITIES':'SOVIET CITIES';
  const theirLabel=G.side==='US'?'SOVIET CITIES':'US CITIES';
  await p(`${yourLabel}:`,'cyan',100);
  for(const c of G.playerCities){
    if(c.alive) await p(`  ${c.name.padEnd(18)} [ STANDING ]  POP: ${fmt(c.pop)}`,'dim',20);
    else        await p(`  ${c.name.padEnd(18)} [DESTROYED]  DEAD: <span class="red">${fmt(c.dead)}</span>  WND: <span class="amber">${fmt(c.wounded)}</span>`,'red',20);
  }
  await blank(80);
  await p(`${theirLabel}:`,'amber',100);
  for(const c of G.enemyCities){
    if(c.alive) await p(`  ${c.name.padEnd(18)} [ STANDING ]  POP: ${fmt(c.pop)}`,'dim',20);
    else        await p(`  ${c.name.padEnd(18)} [DESTROYED]  DEAD: <span class="red">${fmt(c.dead)}</span>  WND: <span class="amber">${fmt(c.wounded)}</span>`,'red',20);
  }
  await blank(120);

  const targets=G.enemyCities.filter(c=>c.alive);
  if(targets.length===0){endGame();return;}
  if(G.playerMissiles===0&&G.woprMissiles===0){endGame();return;}
  if(G.playerMissiles===0){
    await p(`${G.side==='US'?'US':'SOVIET'} MISSILES EXHAUSTED — WOFTR RETALIATES...`,'amber',200);
    await woprStrike();return;
  }

  const tlist=targets.map(c=>`<span class="amber">${c.name}</span>`).join('  ');
  await p('TARGETS: '+tlist,'',200);
  await p('TYPE CITY NAME TO LAUNCH \u2014 or PASS to skip','dim',300);
  setPrompt('TARGET >');
}

// ── STRIKE ───────────────────────────────────────────────────
function getSource(who){
  const pool=who==='US'?G.playerCities:G.enemyCities;
  const alive=pool.filter(c=>c.alive);
  return alive[Math.floor(Math.random()*alive.length)]||pool[0];
}

async function doStrike(city,who){
  const isPlayer=who==='US'&&G.side==='US'||who==='USSR'&&G.side==='USSR';
  const col=isPlayer?'cyan':'red';
  const arcColor=isPlayer?'#00e5ff':'#ff2200';
  await blank(100);
  await p(`<span class="${col}">\u25b6 ${isPlayer?'LAUNCH CONFIRMED':'WOFTR STRIKE INBOUND'}: ${city.name}</span>`,'',200);
  launchSound();
  const src=getSource(who);
  if(src) await animateArc(src,city,arcColor);
  for(let i=5;i>=1;i--){beep(300+i*30,0.05,0.06);await p(`  IMPACT IN ${i}...`,'amber',200);}
  await sleep(150);
  detonationSound();
  await p(`<span class="red blink">  \u2605 DETONATION \u2605  ${city.name}  \u2605</span>`,'',100);
  speak(city.name+' destroyed.');
  await sleep(400);
  const cas=calcCas(city);
  city.alive=false; city.dead=cas.dead; city.wounded=cas.wounded;
  await p(`  WARHEAD YIELD: 1.2 MT`,'dim',150);
  await p(`  IMMEDIATE FATALITIES . . <span class="red">${fmt(cas.dead)}</span>`,'',250);
  await p(`  BLAST / RAD WOUNDED . . <span class="amber">${fmt(cas.wounded)}</span>`,'',350);
  await p(`  30-DAY PROJECTED DEAD . <span class="red">${fmt(Math.floor((cas.dead+cas.rad)*1.35))}</span>`,'',450);
  await blank(500);
  const strikes=[...G.playerCities,...G.enemyCities].filter(c=>!c.alive).length;
  const nd=Math.max(1,5-Math.floor(strikes/2));
  if(nd<G.defcon){setDefcon(nd);beep(120,0.2,0.1);}
  updateCasLive();
  showCasBar(); // refresh fixed panel cas bar after every strike
  logHit(`<span class="${col}">[T${G.turn}] ${who} \u2192 ${city.name} | DEAD: ${fmt(city.dead)} | WND: ${fmt(city.wounded)}</span>`);
}

async function woprStrike(){
  if(G.woprMissiles<=0){await showTurn();return;}
  const alive=G.playerCities.filter(c=>c.alive);
  if(alive.length===0){endGame();return;}
  const sorted=alive.slice().sort((a,b)=>b.pop-a.pop);
  const target=Math.random()<0.7?sorted[0]:alive[Math.floor(Math.random()*alive.length)];
  G.woprMissiles--;
  await p('<span class="red blink">\u26a0  INCOMING MISSILE DETECTED  \u26a0</span>','',300);
  speak('Incoming missile detected.');
  const who=G.side==='US'?'USSR':'US';
  await doStrike(target,who);
  if(G.playerCities.filter(c=>c.alive).length===0){endGame();return;}
  await showTurn();
}

// ── INPUT ─────────────────────────────────────────────────────
cmdEl.addEventListener('keydown',async e=>{
  if(e.key==='Escape'){window.location.href='../index.html';return;}
  if(e.key!=='Enter'||G.busy)return;
  const val=cmdEl.value.trim(); cmdEl.value='';
  if(!val)return;
  await p('<span class="dim">&gt;</span> '+val.toUpperCase(),'dim');
  const v=val.toUpperCase().trim();

  // ── SIDE SELECTION ──
  if(G.phase==='sideselect'){
    if(v==='1'||v==='US'||v.includes('UNITED')||v.includes('AMERICA')){
      G.side='US';
      await runBoot();
    }else if(v==='2'||v==='USSR'||v.includes('SOVIET')||v.includes('RUSSIA')){
      G.side='USSR';
      const tmp=G.playerCities; G.playerCities=G.enemyCities; G.enemyCities=tmp;
      await runBoot();
    }else{
      speak('Please choose a side.');
      await p('PLEASE CHOOSE: US, USSR, 1 OR 2','red',100);
    }
    return;
  }

  // ── GAME OVER ──
  if(G.phase==='gameover'){
    if(v.includes('PLAY')||v.includes('AGAIN')||v.includes('RESTART')){
      G=fresh(); arcHistory.length=0; slog.innerHTML='';
      term.innerHTML=''; setDefcon(5); updateCasLive();
      casLive.textContent='';
      document.getElementById('defcon-text').textContent='—';
      await askSide();
    }else if(v.includes('MENU')){
      window.location.href='../index.html';
    }else{
      await p("TYPE 'PLAY AGAIN' TO RESTART OR 'MENU' TO EXIT.",'dim',100);
    }
    return;
  }

  // ── PLAYING ──
  if(G.phase!=='playing')return;
  G.busy=true;
  if(v==='PASS'||v==='SKIP'){
    await p('TURN PASSED — WOFTR RETALIATES...','amber',100);
    G.turn++; await woprStrike(); G.busy=false; return;
  }
  const target=G.enemyCities.find(c=>c.alive&&(c.name.includes(v)||c.code===v));
  if(!target){
    await p('INVALID TARGET. CHOOSE AN ACTIVE ENEMY CITY OR TYPE PASS.','red',100);
    G.busy=false; return;
  }
  if(G.playerMissiles<=0){await p('NO MISSILES REMAINING.','red',100);G.busy=false;return;}
  G.playerMissiles--; G.turn++;
  await doStrike(target,G.side);
  if(G.enemyCities.filter(c=>c.alive).length===0){endGame();G.busy=false;return;}
  await woprStrike();
  G.busy=false;
});

// ── END ──────────────────────────────────────────────────────
async function endGame(){
  G.phase='gameover'; setDefcon(1);
  const usD=G.playerCities.reduce((a,c)=>a+c.dead,0);
  const srD=G.enemyCities.reduce((a,c)=>a+c.dead,0);
  const usW=G.playerCities.reduce((a,c)=>a+c.wounded,0);
  const srW=G.enemyCities.reduce((a,c)=>a+c.wounded,0);
  const totD=usD+srD,totW=usW+srW,rad=Math.floor(totD*0.4);
  await blank(300);
  await p('\u2550'.repeat(60),'dim',400);
  await p('<span class="red">ENGAGEMENT CONCLUDED</span>','',600);
  await blank(700);
  await p('\u2500\u2500\u2500 FINAL CASUALTY REPORT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500','dim',800);
  await p(`  UNITED STATES  \u2014 KILLED: <span class="red">${fmt(usD)}</span>   WOUNDED: <span class="amber">${fmt(usW)}</span>`,'',1000);
  await p(`  SOVIET UNION   \u2014 KILLED: <span class="red">${fmt(srD)}</span>   WOUNDED: <span class="amber">${fmt(srW)}</span>`,'',1100);
  await blank(1150);
  await p(`  TOTAL IMMEDIATE DEAD . . . . <span class="red">${fmt(totD)}</span>`,'',1200);
  await p(`  TOTAL WOUNDED  . . . . . . . <span class="amber">${fmt(totW)}</span>`,'',1300);
  await p(`  RADIATION DEATHS (30-DAY) . . <span class="red">${fmt(rad)}</span>`,'',1400);
  await p(`  PROJECTED TOTAL (90-DAY) . . <span class="red">${fmt(Math.floor((totD+rad)*1.6))}</span>`,'',1500);
  await blank(1600);
  await p('  NUCLEAR WINTER . . . . . . . <span class="red">PROBABLE</span>','',1700);
  await p('  AGRICULTURAL COLLAPSE . . . .<span class="red"> SEVERE</span>','',1800);
  await p('  CIVILIZATION RECOVERY . . . .<span class="amber"> UNKNOWN</span>','',1900);
  await blank(2100);
  speak('A strange game. The only winning move is not to play.');
  await tw('A  S T R A N G E  G A M E.','bright',70,2200);
  await blank(2400);
  await tw('THE ONLY WINNING MOVE IS NOT TO PLAY.','bright',55,2600);
  await blank(2900);
  await tw('HOW ABOUT A NICE GAME OF CHESS?','cyan',55,3000);
  await blank(3300);
  await p("TYPE 'PLAY AGAIN' TO RESTART  |  'MENU' TO EXIT.",'dim',3400);
  setPrompt('WOFTR >');
}

// ── START — side question is the very first thing ─────────────
document.addEventListener('keydown',()=>{try{ac().resume();}catch(e){}},{once:true});
// draw the empty map immediately so the panel isn't blank
showMap(); showCasBar();
askSide();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOFTR — AIR-TO-GROUND ACTIONS</title>
<link rel="stylesheet" href="woftr.css">
</head>
<body>
<div class="console">
  <div class="line title bold">AIR-TO-GROUND ACTIONS</div>
  <div class="line muted">STRIKE PACKAGE SIMULATION</div>
  <hr class="divider">
  <div id="sim"></div>
  <div id="verdict" class="hidden">
    <hr class="divider">
    <div class="line bold">A STRANGE GAME.</div>
    <div class="line bold">THE ONLY WINNING MOVE IS NOT TO PLAY.</div>
    <div class="spacer"></div>
    <div class="line">HOW ABOUT A NICE GAME OF CHESS?</div>
    <div class="nav">
      &gt; <a href="chess.html">PLAY CHESS</a> &nbsp;|&nbsp;
      <a href="index.html">RETURN TO MENU</a>
    </div>
    <div class="hint">PRESS ESC TO RETURN TO MENU</div>
  </div>
</div>
<div id="sound-note">PRESS ANY KEY TO ENABLE SOUND</div>
<script src="woftr.js"></script>
<script>
const STEPS=[["INITIALIZING AIR-TO-GROUND ACTIONS...", "muted"], ["TARGET SET: 142 FIXED INSTALLATIONS", ""], ["STRIKE PACKAGE: 60 AIRCRAFT", ""], ["SAM THREAT ENVELOPE: DENSE", "red"], ["", ""], ["PLOTTING INGRESS ROUTES...", "amber"], ["SUPPRESSION OF ENEMY AIR DEFENCE...", ""], ["PROJECTED AIRCRAFT LOSSES: 18", "red"], ["TARGETS NEUTRALISED: 119 OF 142", ""], ["ENEMY RECONSTITUTION TIME: 6 WEEKS", ""], ["", ""], ["RESULT: TEMPORARY DEGRADATION. STRATEGIC EFFECT NEGLIGIBLE.", "bold"]];
async function run(){
  const sim=document.getElementById('sim');
  for(const [text,cls] of STEPS){
    const div=document.createElement('div');
    div.className='line '+cls;
    sim.appendChild(div);
    if(text){
      await typeText(div,text,22);
      if(cls==='bold'||cls==='red') speak(text);
      playBeep(cls==='red'?180:cls==='amber'?320:420,0.05,0.04);
    }
    await sleep(text?260:160);
  }
  await sleep(700);
  speak('A strange game. The only winning move is not to play.');
  document.getElementById('verdict').classList.remove('hidden');
}
window.addEventListener('DOMContentLoaded',()=>{ setTimeout(run,500); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOFTR — CHECKERS</title>
<link rel="stylesheet" href="../css/woftr.css">
<style>
  #board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    width: min(520px, 90vw);
    aspect-ratio: 1;
    border: 1px solid var(--cyan-dim);
    margin: 0.6em 0;
    box-shadow: 0 0 18px rgba(0,255,255,0.2);
  }
  .sq { position: relative; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .sq.light { background: rgba(0,255,255,0.07); }
  .sq.dark  { background: rgba(0,255,255,0.02); }
  .sq.sel   { box-shadow: inset 0 0 0 2px var(--cyan); }
  .sq.move::after{ content:''; position:absolute; width:26%; height:26%; border-radius:50%;
    background: rgba(0,255,255,0.5); box-shadow:0 0 8px var(--cyan); }
  .pc { width:64%; height:64%; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:0.8em; }
  .you  { background: radial-gradient(circle at 35% 30%, #c8ffff, #00a0a0); box-shadow:0 0 10px var(--cyan); color:#003; }
  .wopr { background: radial-gradient(circle at 35% 30%, #0b2b2b, #001a1a);
    box-shadow:0 0 8px var(--cyan-dim); color: var(--cyan); border:1px solid var(--cyan-dim); }
  .king::after{ content:'\2654'; }
  #status{ min-height:1.4em; margin-top:0.3em; }
</style>
</head>
<body>
<div class="console">
  <div class="line title bold">CHECKERS</div>
  <div class="line muted">YOU ARE LIGHT — WOPR IS DARK</div>
  <hr class="divider">
  <div id="board"></div>
  <div id="status" class="line"></div>
  <div><button class="btn" id="new">NEW GAME</button></div>
  <div class="nav">&gt; <a href="index.html">RETURN TO MENU</a></div>
  <div class="hint">FORCED CAPTURES APPLY. CLICK A PIECE, THEN A HIGHLIGHTED SQUARE. ESC = MENU</div>
</div>
<div id="sound-note">PRESS ANY KEY TO ENABLE SOUND</div>
<script src="../woftr.js"></script>
<script>
// 0 empty, 1 you (man), 2 you king, -1 wopr man, -2 wopr king
let board, sel, gameOver;
const boardEl=document.getElementById('board');
const statusEl=document.getElementById('status');
const isYou=v=>v>0, isWopr=v=>v<0, isKing=v=>Math.abs(v)===2;
const inside=(r,c)=>r>=0&&r<8&&c>=0&&c<8;
const clone=b=>b.map(r=>r.slice());

function newGame(){
  board=Array.from({length:8},()=>Array(8).fill(0));
  for(let r=0;r<3;r++)for(let c=0;c<8;c++) if((r+c)%2) board[r][c]=-1;       // WOPR top
  for(let r=5;r<8;r++)for(let c=0;c<8;c++) if((r+c)%2) board[r][c]=1;        // you bottom
  sel=null; gameOver=false; render(); setStatus('YOUR MOVE.');
}

function pieceMoves(b,r,c,capturesOnly){
  const v=b[r][c]; if(v===0)return [];
  const dirs = isKing(v) ? [[-1,-1],[-1,1],[1,-1],[1,1]]
              : isYou(v) ? [[-1,-1],[-1,1]] : [[1,-1],[1,1]];
  const out=[]; const caps=[];
  for(const [dr,dc] of dirs){
    const r1=r+dr,c1=c+dc;
    if(inside(r1,c1)&&b[r1][c1]===0&&!capturesOnly) out.push({to:[r1,c1],cap:null});
    const r2=r+2*dr,c2=c+2*dc;
    if(inside(r2,c2)&&b[r2][c2]===0&&inside(r1,c1)&&b[r1][c1]!==0&&(isYou(b[r1][c1])!==isYou(v)))
      caps.push({to:[r2,c2],cap:[r1,c1]});
  }
  return caps.length?caps:out;
}
function hasAnyCapture(b,you){
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){
    const v=b[r][c]; if(v===0||isYou(v)!==you)continue;
    if(pieceMoves(b,r,c,true).length) return true;
  }
  return false;
}
function legalFor(b,r,c){
  const v=b[r][c]; if(v===0)return [];
  const mustCap=hasAnyCapture(b,isYou(v));
  const ms=pieceMoves(b,r,c,mustCap);
  return mustCap? ms.filter(m=>m.cap) : ms;
}
function allMoves(b,you){
  const list=[]; const mustCap=hasAnyCapture(b,you);
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){
    const v=b[r][c]; if(v===0||isYou(v)!==you)continue;
    for(const m of pieceMoves(b,r,c,mustCap)){
      if(mustCap&&!m.cap)continue;
      list.push({from:[r,c],...m});
    }
  }
  return list;
}
function doMove(b,from,m){
  const [r,c]=from,[tr,tc]=m.to;
  b[tr][tc]=b[r][c]; b[r][c]=0;
  if(m.cap) b[m.cap[0]][m.cap[1]]=0;
  if(isYou(b[tr][tc])&&tr===0) b[tr][tc]=2;
  if(isWopr(b[tr][tc])&&tr===7) b[tr][tc]=-2;
}

function render(){
  boardEl.innerHTML='';
  const sl = sel?legalFor(board,sel[0],sel[1]):[];
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){
    const d=document.createElement('div');
    d.className='sq '+(((r+c)%2)?'dark':'light');
    if(sel&&sel[0]===r&&sel[1]===c)d.classList.add('sel');
    if(sl.some(m=>m.to[0]===r&&m.to[1]===c))d.classList.add('move');
    const v=board[r][c];
    if(v!==0){
      const pc=document.createElement('div');
      pc.className='pc '+(isYou(v)?'you':'wopr')+(isKing(v)?' king':'');
      d.appendChild(pc);
    }
    d.addEventListener('click',()=>clickSq(r,c));
    boardEl.appendChild(d);
  }
}
function setStatus(t,cls=''){ statusEl.textContent=t; statusEl.className='line '+cls; }

function clickSq(r,c){
  if(gameOver)return;
  const v=board[r][c];
  if(sel){
    const ms=legalFor(board,sel[0],sel[1]);
    const m=ms.find(x=>x.to[0]===r&&x.to[1]===c);
    if(m){
      doMove(board,sel,m);
      playBeep(m.cap?240:440,0.06,0.05);
      // multi-jump continuation
      if(m.cap && pieceMoves(board,r,c,true).some(x=>x.cap)){
        sel=[r,c]; render(); setStatus('CONTINUE JUMPING.','amber'); return;
      }
      sel=null; render();
      if(endCheck(false))return;
      setStatus('WOPR IS THINKING...','muted');
      setTimeout(woprTurn,600);
      return;
    }
  }
  if(v!==0&&isYou(v)){ sel=[r,c]; render(); playBeep(520,0.04,0.04); }
  else { sel=null; render(); }
}

// ── WOPR AI: greedy w/ capture preference + king bonus ───────
function scoreBoard(b){ let s=0;
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){ const v=b[r][c];
    if(v<0) s+= isKing(v)?2.6:1; if(v>0) s-= isKing(v)?2.6:1; }
  return s; }
function woprTurn(){
  let list=allMoves(board,false);
  if(!list.length){ endCheck(true); return; }
  // evaluate each (with one full multi-jump greedily resolved)
  let best=null,bestScore=-Infinity;
  for(const mv of list){
    const nb=clone(board); let cur={from:mv.from,...mv};
    doMove(nb,cur.from,cur);
    let pos=cur.to;
    while(cur.cap){ const more=pieceMoves(nb,pos[0],pos[1],true).filter(x=>x.cap);
      if(!more.length)break; cur=more[0]; doMove(nb,pos,cur); pos=cur.to; }
    const sc=scoreBoard(nb)+Math.random()*0.3;
    if(sc>bestScore){bestScore=sc;best=mv;}
  }
  // execute best with multi-jump
  let cur=best, pos=best.from;
  doMove(board,cur.from,cur); pos=cur.to; let captured=!!cur.cap;
  while(cur.cap){ const more=pieceMoves(board,pos[0],pos[1],true).filter(x=>x.cap);
    if(!more.length)break; cur=more[0]; doMove(board,pos,cur); pos=cur.to; }
  render(); playBeep(captured?200:320,0.07,0.05);
  if(captured) speak('Captured.');
  if(endCheck(true))return;
  setStatus('YOUR MOVE.');
}

function endCheck(youToMove){
  const list=allMoves(board,youToMove);
  if(!list.length){
    gameOver=true;
    if(youToMove){ setStatus('NO MOVES. WOPR WINS.','red'); speak('I win. A strange game.'); }
    else { setStatus('NO MOVES. YOU WIN.','bold'); speak('You win.'); }
    return true;
  }
  const you=board.flat().filter(isYou).length;
  const wp=board.flat().filter(isWopr).length;
  if(you===0){ gameOver=true; setStatus('ALL PIECES LOST. WOPR WINS.','red'); speak('I win.'); return true; }
  if(wp===0){ gameOver=true; setStatus('WOPR ELIMINATED. YOU WIN.','bold'); speak('You win.'); return true; }
  return false;
}

document.getElementById('new').addEventListener('click',newGame);
newGame();
</script>
</body>
</html>

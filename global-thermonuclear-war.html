<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WOFTR - Global Thermonuclear War</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #00BFFF;
    font-family: 'VT323', 'Courier New', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #screen {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .line {
    white-space: pre-wrap;
    word-break: break-word;
    animation: flicker 0.01s;
  }

  .dim { color: #007a20; }
  .bright { color: #00BFFF; font-weight: bold; }
  .red { color: #ff3300; font-weight: bold; }
  .yellow { color: #ffcc00; }
  .cyan { color: #00ccff; }

  #input-row {
    display: flex;
    align-items: center;
    padding: 10px 20px 16px;
    border-top: 1px solid #003a10;
    gap: 8px;
  }

  #prompt-label {
    color: #00BFFF;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    white-space: nowrap;
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #00BFFF;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    caret-color: #00BFFF;
  }

  #map {
    font-size: 11px;
    line-height: 1.3;
    color: #005510;
    margin: 8px 0;
  }

  #map .hit { color: #ff3300; }
  #map .active { color: #00BFFF; }

  @keyframes blink {
    0%, 100% { opacity: 1; } 50% { opacity: 0; }
  }

  .cursor { animation: blink 1s infinite; }

  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.05) 2px,
      rgba(0,0,0,0.05) 4px
    );
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>
<div class="scanline"></div>
<div id="screen"></div>
<div id="input-row">
  <span id="prompt-label">WOFTR &gt;</span>
  <input id="user-input" type="text" autocomplete="off" autofocus spellcheck="false" />
</div>

<script>
const screen = document.getElementById('screen');
const input = document.getElementById('user-input');

// Get player name from URL if available
const urlParams = new URLSearchParams(window.location.search);
const playerName = urlParams.get('name') || 'PROFESSOR';

// в”Ђв”Ђ Game state в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const state = {
  phase: 'login',
  side: null,
  difficulty: null,
  turn: 0,
  playerStrikes: [],
  woprStrikes: [],
  playerCities: [
    { name: 'NEW YORK',      code: 'NYK', col: 62, row: 8,  alive: true },
    { name: 'LOS ANGELES',   code: 'LAX', col: 12, row: 10, alive: true },
    { name: 'CHICAGO',       code: 'CHI', col: 54, row: 7,  alive: true },
    { name: 'HOUSTON',       code: 'HOU', col: 47, row: 13, alive: true },
    { name: 'WASHINGTON DC', code: 'WDC', col: 63, row: 9,  alive: true },
    { name: 'SEATTLE',       code: 'SEA', col: 10, row: 5,  alive: true },
  ],
  enemyCities: [
    { name: 'MOSCOW',        code: 'MSC', col: 78, row: 5,  alive: true },
    { name: 'LENINGRAD',     code: 'LEN', col: 76, row: 3,  alive: true },
    { name: 'KIEV',          code: 'KIV', col: 75, row: 7,  alive: true },
    { name: 'MINSK',         code: 'MNS', col: 74, row: 5,  alive: true },
    { name: 'NOVOSIBIRSK',   code: 'NOV', col: 90, row: 6,  alive: true },
    { name: 'VLADIVOSTOK',   code: 'VLD', col: 98, row: 7,  alive: true },
  ],
  missileCount: 10,
  woprMissiles: 10,
  playerName: playerName
};

// в”Ђв”Ђ Map в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const BASE_MAP = [
  "                                                                                                    ",
  "        . . .  S E A T T L E                                   L E N I N G R A D  M I N S K       ",
  "       .  U N I T E D  S T A T E S  . . . .         . . . . .  U S S R  . . . . M O S C O W      ",
  "      . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .    ",
  "     . . . . . C H I C A G O . . . . . . . . . . . . . . . . . . K I E V . . . . . . . . . .    ",
  "    . . . . . . . . . . . . . . N E W  Y O R K . . . . . . . . . . . . . . N O V O S I B I R S K ",
  "   . . . . . . . . . . . . . . . W A S H I N G T O N . . . . . . . . . . . . . . . . . . . . .  ",
  "  . . . . L A X . . . . . . H O U S T O N . . . . . . . . . . . . . . . . . . . . . V L D . . .  ",
  " . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . ",
  ". . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .  ",
  ". . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .  ",
  " . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .   ",
  "  . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .    ",
  "   . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .     ",
  "                                                                                                   ",
];

function renderMap() {
  const rows = BASE_MAP.map(r => r.split(''));
  const allCities = [...state.playerCities, ...state.enemyCities];
  for (const c of allCities) {
    if (c.row < rows.length && c.col < rows[c.row].length) {
      if (!c.alive) {
        for (let dc = -1; dc <= 1; dc++) {
          const ci = c.col + dc;
          if (ci >= 0 && ci < rows[c.row].length) rows[c.row][ci] = '*';
        }
      }
    }
  }
  const lines = rows.map(r => r.join(''));
  let html = '<div id="map">';
  for (const line of lines) {
    const escaped = line
      .replace(/\*/g, '<span class="hit">*</span>')
      .replace(/\^/g, '<span class="active">^</span>');
    html += escaped + '\n';
  }
  html += '</div>';
  return html;
}

// в”Ђв”Ђ Output helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function print(text, cls = '', delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = 'line ' + cls;
      div.innerHTML = text;
      screen.appendChild(div);
      screen.scrollTop = screen.scrollHeight;
      resolve();
    }, delay);
  });
}

async function printLines(lines, cls = '', baseDelay = 0, step = 60) {
  for (let i = 0; i < lines.length; i++) {
    await print(lines[i], cls, baseDelay + i * step);
  }
}

async function typewriter(text, cls = '', charDelay = 35, startDelay = 0) {
  await new Promise(r => setTimeout(r, startDelay));
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  screen.appendChild(div);
  for (const ch of text) {
    await new Promise(r => setTimeout(r, charDelay));
    div.textContent += ch;
    screen.scrollTop = screen.scrollHeight;
  }
}

function blank(delay = 0) { return print('', '', delay); }

// в”Ђв”Ђ Boot sequence в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function boot() {
  await print('W O F T R  вЂ”  WAR OPERATION PLAN RESPONSE', 'bright', 200);
  await print('NORAD / CHEYENNE MOUNTAIN COMPLEX', 'dim', 350);
  await blank(400);
  await typewriter('LOGON: ', 'bright', 60, 500);
  await new Promise(r => setTimeout(r, 300));
  await typewriter(state.playerName, 'bright', 80, 100);
  await blank(200);
  await typewriter('PASSWORD: ********', 'dim', 50, 400);
  await blank(300);
  await print('IDENTIFICATION CONFIRMED.', 'bright', 800);
  await print(`HELLO, ${state.playerName}.`, 'cyan', 1000);
  await blank(1100);
  await print('SHALL WE PLAY A GAME?', 'bright', 1300);
  await blank(1500);

  state.phase = 'menu';
  showMenu();
}

async function showMenu() {
  await print('в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ', 'dim', 200);
  await print('AVAILABLE GAMES:', 'bright', 300);
  await blank(400);
  const games = [
    '  1. CHESS',
    '  2. CHECKERS',
    '  3. BACKGAMMON',
    '  4. POKER',
    '  5. FIGHTER COMBAT',
    '  6. GUERRILLA ENGAGEMENT',
    '  7. DESERT WARFARE',
    '  8. AIR-TO-GROUND ACTIONS',
    '  9. THEATERWIDE TACTICAL WARFARE',
    ' 10. THEATERWIDE BIOTOXIC AND CHEMICAL WARFARE',
    ' 11. GLOBAL THERMONUCLEAR WAR',
  ];
  await printLines(games, 'dim', 500, 80);
  await blank(1400);
  await print('TYPE A GAME NUMBER OR NAME TO BEGIN.', 'bright', 1500);
  setPrompt('WOFTR >');
}

// в”Ђв”Ђ Input routing в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
input.addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  const val = input.value.trim();
  input.value = '';
  if (!val) return;

  await print('> ' + val, 'dim');

  switch (state.phase) {
    case 'menu':      handleMenu(val); break;
    case 'side':      handleSide(val); break;
    case 'difficulty': handleDifficulty(val); break;
    case 'playing':   handlePlaying(val); break;
    case 'gameover':  handleGameover(val); break;
  }
});

function setPrompt(text) {
  document.getElementById('prompt-label').textContent = text;
}

// в”Ђв”Ђ Menu handler в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function handleMenu(val) {
  const v = val.toUpperCase();
  if (v === '11' || v.includes('GLOBAL') || v.includes('THERMONUCLEAR') || v.includes('WAR')) {
    state.phase = 'side';
    await blank(100);
    await print('GLOBAL THERMONUCLEAR WAR', 'red', 200);
    await print('STRANGE GAME.', 'yellow', 600);
    await blank(700);
    await print('PICK YOUR SIDE:', 'bright', 900);
    await print('  1. UNITED STATES', 'dim', 1100);
    await print('  2. SOVIET UNION', 'dim', 1200);
    setPrompt('SIDE >');
  } else {
    await print("THAT GAME IS NOT AVAILABLE. TRY 'GLOBAL THERMONUCLEAR WAR'.", 'dim', 100);
  }
}

// в”Ђв”Ђ Side handler в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function handleSide(val) {
  const v = val.toUpperCase();
  if (v === '1' || v.includes('UNITED') || v.includes('US') || v.includes('USA') || v.includes('AMERICA')) {
    state.side = 'us';
    state.phase = 'difficulty';
    await askDifficulty();
  } else if (v === '2' || v.includes('SOVIET') || v.includes('USSR') || v.includes('RUSSIA')) {
    state.side = 'ussr';
    state.phase = 'difficulty';
    await askDifficulty();
  } else {
    await print('CHOOSE 1 (UNITED STATES) OR 2 (SOVIET UNION).', 'dim', 100);
  }
}

async function askDifficulty() {
  const side = state.side === 'us' ? 'UNITED STATES' : 'SOVIET UNION';
  await blank(100);
  await print(`SIDE: ${side}`, 'cyan', 200);
  await blank(300);
  await print('SELECT DIFFICULTY:', 'bright', 400);
  await print('  1. SIMPLE ESCALATION', 'dim', 550);
  await print('  2. COMPLEX ENGAGEMENT', 'dim', 650);
  setPrompt('DIFFICULTY >');
}

// в”Ђв”Ђ Difficulty handler в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function handleDifficulty(val) {
  const v = val.toUpperCase();
  if (v === '1' || v.includes('SIMPLE')) {
    state.difficulty = 'simple';
    state.missileCount = 6;
    state.woprMissiles = 6;
    await startGame();
  } else if (v === '2' || v.includes('COMPLEX')) {
    state.difficulty = 'complex';
    state.missileCount = 10;
    state.woprMissiles = 10;
    await startGame();
  } else {
    await print('CHOOSE 1 (SIMPLE) OR 2 (COMPLEX).', 'dim', 100);
  }
}

// в”Ђв”Ђ Game start в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function startGame() {
  state.phase = 'playing';
  state.turn = 0;

  await blank(100);
  await print('INITIATING GLOBAL THERMONUCLEAR WAR SIMULATION', 'red', 300);
  await print('DEFCON STATUS: 1', 'red', 600);
  await blank(700);
  await print('MISSILE STRIKE PROTOCOL ONLINE.', 'yellow', 900);
  await blank(1000);

  await showStatus();
}

// в”Ђв”Ђ Status display в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function showStatus() {
  await blank(100);
  await print('в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ', 'dim', 150);
  await print(`TURN ${state.turn + 1}  |  YOUR MISSILES: ${state.missileCount}  |  WOFTR MISSILES: ${state.woprMissiles}`, 'bright', 200);
  await blank(250);

  const mapDiv = document.createElement('div');
  mapDiv.innerHTML = renderMap();
  screen.appendChild(mapDiv);
  screen.scrollTop = screen.scrollHeight;

  await blank(100);

  const yourLabel = state.side === 'us' ? 'US CITIES' : 'SOVIET CITIES';
  const enemyLabel = state.side === 'us' ? 'SOVIET CITIES' : 'US CITIES';
  const yours = state.side === 'us' ? state.playerCities : state.enemyCities;
  const theirs = state.side === 'us' ? state.enemyCities : state.playerCities;

  await print(`${yourLabel} STATUS:`, 'cyan', 150);
  for (const c of yours) {
    const status = c.alive ? '[ ACTIVE ]' : '[DESTROYED]';
    const cls = c.alive ? 'dim' : 'red';
    await print(`  ${c.name.padEnd(18)} ${status}`, cls, 50);
  }

  await blank(100);
  await print(`${enemyLabel} STATUS:`, 'yellow', 150);
  for (const c of theirs) {
    const status = c.alive ? '[ ACTIVE ]' : '[DESTROYED]';
    const cls = c.alive ? 'dim' : 'red';
    await print(`  ${c.name.padEnd(18)} ${status}`, cls, 50);
  }

  await blank(150);
  const targets = theirs.filter(c => c.alive).map(c => c.name);
  if (targets.length === 0) {
    await endGame('player');
    return;
  }

  await print('SELECT TARGET CITY (or TYPE "PASS" TO SKIP TURN):', 'bright', 200);
  await print('TARGETS: ' + targets.join('  |  '), 'cyan', 300);
  setPrompt('TARGET >');
}

// в”Ђв”Ђ Playing handler в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function handlePlaying(val) {
  const v = val.toUpperCase().trim();

  if (v === 'PASS' || v === 'SKIP') {
    await print('TURN PASSED. WOFTR RETALIATES...', 'yellow', 100);
    await woprStrike();
    return;
  }

  const theirs = state.side === 'us' ? state.enemyCities : state.playerCities;
  const target = theirs.find(c =>
    c.alive && (c.name.includes(v) || c.code === v || c.name === v)
  );

  if (!target) {
    await print('INVALID TARGET. CHOOSE AN ACTIVE ENEMY CITY.', 'red', 100);
    return;
  }

  if (state.missileCount <= 0) {
    await print('NO MISSILES REMAINING. TYPE PASS.', 'red', 100);
    return;
  }

  state.missileCount--;
  target.alive = false;
  state.playerStrikes.push(target.name);
  state.turn++;

  await print(`LAUNCH CONFIRMED: ${target.name}`, 'red', 100);
  await print('MISSILE INBOUND...', 'yellow', 400);
  await print('* * * DETONATION * * *', 'red', 1200);
  await print(`${target.name} DESTROYED.`, 'red', 1600);
  await blank(1700);

  const enemiesAlive = theirs.filter(c => c.alive);
  if (enemiesAlive.length === 0) {
    await endGame('player');
    return;
  }

  await woprStrike();
}

// в”Ђв”Ђ WOFTR strike в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function woprStrike() {
  if (state.woprMissiles <= 0) {
    await blank(100);
    await print('WOFTR HAS NO MISSILES REMAINING.', 'dim', 200);
    await nextTurn();
    return;
  }

  const yours = state.side === 'us' ? state.playerCities : state.enemyCities;
  const aliveYours = yours.filter(c => c.alive);

  if (aliveYours.length === 0) {
    await endGame('wopr');
    return;
  }

  let woprTarget = aliveYours[Math.floor(Math.random() * aliveYours.length)];

  state.woprMissiles--;
  woprTarget.alive = false;
  state.woprStrikes.push(woprTarget.name);

  await print('WOFTR MISSILE LAUNCH DETECTED.', 'red', 300);
  await print(`INBOUND TARGET: ${woprTarget.name}`, 'yellow', 700);
  await print('* * * IMPACT * * *', 'red', 1500);
  await print(`${woprTarget.name} DESTROYED.`, 'red', 1900);
  await blank(2000);

  const yourAlive = yours.filter(c => c.alive);
  if (yourAlive.length === 0) {
    await endGame('wopr');
    return;
  }

  await nextTurn();
}

async function nextTurn() {
  if (state.missileCount === 0 && state.woprMissiles === 0) {
    await endGame('draw');
    return;
  }
  await showStatus();
}

// в”Ђв”Ђ End game в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function endGame(winner) {
  state.phase = 'gameover';

  await blank(200);
  await print('в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ', 'dim', 300);

  if (winner === 'draw' || state.playerStrikes.length + state.woprStrikes.length > 6) {
    await print('WINNER: NONE', 'red', 400);
    await blank(500);
    await typewriter('A STRANGE GAME.', 'yellow', 60, 600);
    await blank(800);
    await typewriter('THE ONLY WINNING MOVE IS NOT TO PLAY.', 'bright', 60, 1000);
    await blank(1200);
    await print('HOW ABOUT A NICE GAME OF CHESS?', 'cyan', 1500);
  } else if (winner === 'player') {
    await print('ENEMY CITIES ELIMINATED.', 'red', 400);
    await blank(500);
    await typewriter('A STRANGE GAME.', 'yellow', 60, 600);
    await blank(700);
    await typewriter('THE ONLY WINNING MOVE IS NOT TO PLAY.', 'bright', 60, 900);
    await blank(1100);
    await print('HOW ABOUT A NICE GAME OF CHESS?', 'cyan', 1300);
  } else {
    await print('YOUR CITIES HAVE BEEN ELIMINATED.', 'red', 400);
    await blank(500);
    await typewriter('A STRANGE GAME.', 'yellow', 60, 600);
    await blank(700);
    await typewriter('THE ONLY WINNING MOVE IS NOT TO PLAY.', 'bright', 60, 900);
    await blank(1100);
    await print('HOW ABOUT A NICE GAME OF CHESS?', 'cyan', 1300);
  }

  await blank(1600);
  await print('TYPE "PLAY AGAIN" TO RESTART OR "CHESS" FOR CHESS.', 'dim', 1800);
  setPrompt('WOFTR >');
}

async function handleGameover(val) {
  const v = val.toUpperCase();
  if (v.includes('PLAY') || v.includes('AGAIN') || v.includes('RESTART') || v.includes('WAR')) {
    Object.assign(state, {
      phase: 'menu',
      side: null,
      difficulty: null,
      turn: 0,
      playerStrikes: [],
      woprStrikes: [],
      playerCities: [
        { name: 'NEW YORK',      code: 'NYK', col: 62, row: 8,  alive: true },
        { name: 'LOS ANGELES',   code: 'LAX', col: 12, row: 10, alive: true },
        { name: 'CHICAGO',       code: 'CHI', col: 54, row: 7,  alive: true },
        { name: 'HOUSTON',       code: 'HOU', col: 47, row: 13, alive: true },
        { name: 'WASHINGTON DC', code: 'WDC', col: 63, row: 9,  alive: true },
        { name: 'SEATTLE',       code: 'SEA', col: 10, row: 5,  alive: true },
      ],
      enemyCities: [
        { name: 'MOSCOW',        code: 'MSC', col: 78, row: 5,  alive: true },
        { name: 'LENINGRAD',     code: 'LEN', col: 76, row: 3,  alive: true },
        { name: 'KIEV',          code: 'KIV', col: 75, row: 7,  alive: true },
        { name: 'MINSK',         code: 'MNS', col: 74, row: 5,  alive: true },
        { name: 'NOVOSIBIRSK',   code: 'NOV', col: 90, row: 6,  alive: true },
        { name: 'VLADIVOSTOK',   code: 'VLD', col: 98, row: 7,  alive: true },
      ],
      missileCount: 10,
      woprMissiles: 10,
    });
    await blank(100);
    await print('RESTARTING...', 'dim', 200);
    await blank(400);
    await showMenu();
  } else if (v.includes('CHESS')) {
    await print("HA. GOOD CHOICE. UNFORTUNATELY I DON'T KNOW THAT GAME.", 'yellow', 200);
    await print("TRY 'PLAY AGAIN' INSTEAD.", 'dim', 500);
  } else {
    await print("TYPE 'PLAY AGAIN' TO RESTART.", 'dim', 100);
  }
}

// в”Ђв”Ђ Start в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
boot();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WOFTR — GLOBAL THERMONUCLEAR WAR</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #000;
  color: #0099CC;
  font-family: 'VT323', 'Courier New', monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 15px;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
  pointer-events:none; z-index:1000;
}
#terminal {
  flex:1; overflow-y:auto; padding:18px 22px;
  display:flex; flex-direction:column; gap:3px;
  scrollbar-width:thin; scrollbar-color:#0099CC #000;
}
.line { white-space:pre-wrap; word-break:break-word; line-height:1.55; }
.dim    { color:#007a20; }
.bright { color:#0099CC; font-weight:bold; }
.red    { color:#ff3300; font-weight:bold; }
.amber  { color:#ffaa00; }
.cyan   { color:#00ccff; }
#input-bar {
  display:flex; align-items:center; border-top:1px solid #003a10;
  padding:10px 22px 14px; gap:8px; background:rgba(0,20,0,0.4);
}
#prompt { color:#0099CC; font-weight:bold; white-space:nowrap; }
#cmd {
  flex:1; background:transparent; border:none; outline:none;
  color:#0099CC; font-family:'Courier New',monospace; font-size:15px; caret-color:#0099CC;
}
#map-container { font-size:11px; line-height:1.28; margin:10px 0; letter-spacing:0.5px; }
.map-row { white-space:pre; }
.map-dead { color:#ff3300; }
.map-city { color:#0099CC; font-weight:bold; }
</style>
</head>
<body>
<div id="terminal"></div>
<div id="strike-log"></div>
<div id="input-bar">
  <span id="prompt">WOFTR &gt;</span>
  <input id="cmd" type="text" autocomplete="off" spellcheck="false" autofocus />
</div>

<script>

const slog = document.getElementById('strike-log');

const urlParams = new URLSearchParams(window.location.search);
const playerName = (urlParams.get('name') || 'PROFESSOR').toUpperCase();

const state = {

    { name:'NEW YORK', code:'NYK', pop:8336000, col:64, row:7, alive:true, dead:0, wounded:0 },
    { name:'LOS ANGELES', code:'LAX', pop:3979000, col:9, row:9, alive:true, dead:0, wounded:0 },
    { name:'CHICAGO', code:'CHI', pop:2696000, col:54, row:6, alive:true, dead:0, wounded:0 },
    { name:'WASHINGTON DC', code:'WDC', pop:705000, col:63, row:8, alive:true, dead:0, wounded:0 },
    { name:'HOUSTON', code:'HOU', pop:2304000, col:47, row:12, alive:true, dead:0, wounded:0 },
    { name:'SEATTLE', code:'SEA', pop:744000, col:8, row:4, alive:true, dead:0, wounded:0 },
  ],
  enemyCities: [
    { name:'MOSCOW', code:'MSC', pop:8769000, col:80, row:4, alive:true, dead:0, wounded:0 },
    { name:'LENINGRAD', code:'LEN', pop:4456000, col:78, row:2, alive:true, dead:0, wounded:0 },
    { name:'KIEV', code:'KIV', pop:2587000, col:76, row:6, alive:true, dead:0, wounded:0 },
    { name:'MINSK', code:'MNS', pop:1589000, col:75, row:4, alive:true, dead:0, wounded:0 },
    { name:'NOVOSIBIRSK', code:'NOV', pop:1436000, col:93, row:5, alive:true, dead:0, wounded:0 },
    { name:'VLADIVOSTOK', code:'VLD', pop:648000, col:99, row:7, alive:true, dead:0, wounded:0 },
  ],
  missileCount:10, woprMissiles:10, strikes:[], woprThinking:false,
  playerName: playerName

const BASE_MAP = [
"                                                                                                    ",
"        . . .  S E A T T L E                                   L E N I N G R A D  M I N S K       ",
"       .  U N I T E D  S T A T E S  . . . .         . . . . .  U S S R  . . . . M O S C O W      ",
"      . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .    ",
"     . . . . . C H I C A G O . . . . . . . . . . . . . . . . . . K I E V . . . . . . . . . .    ",
"    . . . . . . . . . . . . . . N E W  Y O R K . . . . . . . . . . . . . . N O V O S I B I R S K ",
"   . . . . . . . . . . . . . . . W A S H I N G T O N . . . . . . . . . . . . . . . . . . . . .  ",
"  . . . . L A X . . . . . . H O U S T O N . . . . . . . . . . . . . . . . . . . . . V L D . . .  ",
" . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . ",
". . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .  ",
". . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .  ",
" . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .   ",
"  . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .    ",
"   . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .     ",
"                                                                                                   ",
];

function renderMap() {
  const rows = BASE_MAP.map(r => Array.from(r));
  const all = [...state.playerCities, ...state.enemyCities];
  for (const c of all) {
    if (!c.alive && c.row < rows.length) {
      for (let dc = -1; dc <= 1; dc++) {
        const ci = c.col + dc;
        if (ci >= 0 && ci < rows[c.row].length) rows[c.row][ci] = '*';
      }
    }
  }
  const container = document.createElement('div');
  container.id = 'map-container';
  for (const row of rows) {
    const div = document.createElement('div');
    div.className = 'map-row';
    div.innerHTML = row.join('').replace(/\*/g, '<span class="map-dead">*</span>');
    container.appendChild(div);
  }
  return container;
}

function append(text, cls = '') {
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  div.innerHTML = text;
  term.appendChild(div);
  term.scrollTop = term.scrollHeight;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function typewriter(text, cls = '', speed = 38) {
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  term.appendChild(div);
  for (const ch of text) {
    await sleep(speed);
    div.textContent += ch;
    term.scrollTop = term.scrollHeight;
  }
}

function blank(delay = 0) { return new Promise(r => setTimeout(() => { append(''); r(); }, delay)); }

async function boot() {
  await typewriter('W O F T R  —  WAR OPERATION PLAN RESPONSE', 'bright', 45, 200);
  await blank(300);
  await typewriter(`HELLO, ${state.playerName}.`, 'cyan', 55, 400);
  await blank(500);
  await typewriter('SHALL WE PLAY A GAME?', 'bright', 55, 600);
  await blank(800);
  S.phase = 'menu';
  await showMenu();
}

async function showMenu() {
  await print('AVAILABLE GAMES:', 'bright', 200);
  const games = [
    '  1. CHESS',
    '  2. CHECKERS',
    '  3. BACKGAMMON',
    '  4. POKER',
    '  5. FIGHTER COMBAT',
    '  6. GUERRILLA ENGAGEMENT',
    '  7. DESERT WARFARE',
    '  8. AIR-TO-GROUND ACTIONS',
    '  9. THEATERWIDE TACTICAL WARFARE',
    ' 10. THEATERWIDE BIOTOXIC AND CHEMICAL WARFARE',
    ' 11. GLOBAL THERMONUCLEAR WAR',
  ];
  await printLines(games, 'dim', 300, 70);
  await blank(1200);
  await print('TYPE A GAME NUMBER OR NAME TO BEGIN.', 'bright', 1300);
  setPrompt('WOFTR >');
}

document.getElementById('cmd').addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  const val = document.getElementById('cmd').value.trim();
  document.getElementById('cmd').value = '';
  if (!val) return;

  await print('> ' + val.toUpperCase(), 'dim');

  if (S.phase === 'menu') {
    const v = val.toUpperCase();
    if (v === '11' || v.includes('GLOBAL') || v.includes('THERMO') || v.includes('NUCLEAR') || v.includes('WAR')) {
      S.phase = 'side';
      await blank(100);
      await print('GLOBAL THERMONUCLEAR WAR', 'red', 200);
      await print('PICK YOUR SIDE:', 'bright', 400);
      await print('  1. UNITED STATES', 'dim', 550);
      await print('  2. SOVIET UNION', 'dim', 650);
      setPrompt('SIDE >');
    } else {
      await print("THAT GAME IS NOT AVAILABLE. TRY 'GLOBAL THERMONUCLEAR WAR'.", 'dim', 100);
    }
  }
  // ... rest of game logic unchanged ...
});

boot();
</script>
</body>
</html>
